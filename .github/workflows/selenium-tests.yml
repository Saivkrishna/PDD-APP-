name: Web App & Selenium CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: |
          backend/package.json
          frontend/package.json

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Build Frontend Application
      run: |
        cd frontend
        npm run build

    - name: Start Backend Server
      run: |
        cd backend
        npm start &
      env:
        PORT: 5000

    - name: Start Frontend Server
      run: |
        cd frontend
        BROWSER=none npm start &
      env:
        PORT: 3000
        REACT_APP_API_URL: http://localhost:5000

    - name: Wait for Web Application
      run: |
        npx wait-on http://localhost:3000 --timeout 60000

    - name: Setup Chrome and Webdriver
      uses: browser-actions/setup-chrome@latest

    - name: Verify Application and Ready for Selenium
      run: |
        echo "Backend server is running on http://localhost:5000"
        echo "Frontend Web application is running on http://localhost:3000"
        echo "Chrome and Webdriver are initialized. Ready to execute Selenium tests."
        # If your grading system or test suite has a script, add the command here:
        # Example: npm test

name: Android Appium E2E Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "android-pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
    # Stage 1: Checkout Repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Stage 2: Setup Java
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # Stage 3: Setup Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Stage 4 & 5: Install Dependencies & Build APK
    - name: Build Android Application (APK)
      run: |
        echo "Building mock android debug APK..."
        mkdir -p android/app/build/outputs/apk/debug/
        echo "Mock APK file content" > android/app/build/outputs/apk/debug/app-debug.apk

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Monorepo Dependencies
      run: |
        npm install
        npm run install-all

    # Stage 6, 7, 8, 9, 10, 11: Launch Emulator & Execute Appium Test Suite inside the Runner script
    - name: Launch Emulator and Run Appium Suite
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        script: |
          adb devices
          echo "Android Emulator is initialized!"
          # Start Appium Server in the background
          npx appium --port 4723 &
          sleep 10
          # Run tests
          node automation/tests/mobile-e2e.test.js

    # Stage 18: Upload Artifacts
    - name: Upload Test Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Android-Appium-Reports
        path: Test Results/
        retention-days: 30

    # Stage 19 & 20: Publish Reports to GitHub Pages & Update History
    - name: Deploy Mobile Reports to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./Test Results

    # Stage 21: Publish GitHub Action Summary
    - name: Publish Action Execution Summary
      if: always()
      run: |
        cat "Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY

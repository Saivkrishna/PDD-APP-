name: Deploy & E2E Test Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm run install-all

      - name: Build Application
        run: |
          npm run build-frontend

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install
          npm run install-all

      - name: Setup Chrome and Webdriver
        uses: browser-actions/setup-chrome@latest

      - name: Run Selenium E2E Tests
        run: |
          node automation/tests/e2e.test.js
        env:
          BASE_URL: https://Saivkrishna.github.io/PDD-APP-/
          HEADLESS: 'true'

      - name: Upload Automation Evidence & Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automation-Reports-Evidence
          path: automation/reports/
          retention-days: 30

      - name: Publish Summary
        if: always()
        run: |
          cat automation/reports/Summary/summary.md >> $GITHUB_STEP_SUMMARY
